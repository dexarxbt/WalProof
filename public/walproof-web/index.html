<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>WalProof — Proof Before Payout</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {
        heading: ["Instrument Serif", "serif"],
        body: ["Barlow", "sans-serif"],
        mono: ["Barlow", "sans-serif"],
        metric: ["Instrument Serif", "serif"]
      },
      colors: {
        navy: "#07111F",
        midnight: "#0B1B33",
        royal: "#155EEF",
        electric: "#2F80FF",
        ice: "#BFE3FF",
        soft: "#F4F8FF",
        mist: "#D8E4F2",
        slateText: "#8EA4BF",
        success: "#3DDC97",
        amber: "#F7B955",
        danger: "#FF5C7A"
      },
      boxShadow: {
        glow: "0 30px 80px rgba(21,94,239,0.28)",
        soft: "0 18px 55px rgba(0,0,0,0.28)",
        card: "0 20px 70px rgba(47,128,255,0.12)"
      }
    }
  }
}
</script>
<style>
  :root {
    color-scheme: dark;
    --line: rgba(255,255,255,.12);
    --panel: rgba(11,27,51,.68);
    --panel-2: rgba(7,17,31,.82);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font-family: Barlow, sans-serif;
    background:
      radial-gradient(circle at 72% 8%, rgba(47,128,255,.22), transparent 34rem),
      radial-gradient(circle at 18% 92%, rgba(191,227,255,.12), transparent 34rem),
      linear-gradient(135deg, #07111F 0%, #0B1B33 42%, #030812 100%);
    color: #F4F8FF;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(rgba(191,227,255,.035) 1px, transparent 1px),
      linear-gradient(90deg, rgba(191,227,255,.035) 1px, transparent 1px);
    background-size: 76px 76px;
    mask-image: linear-gradient(to bottom, black, transparent 72%);
    z-index: -3;
  }
  .bg-walrus {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: -4;
    background:
      linear-gradient(180deg, rgba(7,17,31,.42), rgba(7,17,31,.94)),
      url("./assets/proof-room-wide.png") center / cover no-repeat;
    opacity: .5;
  }
  .hero-bg {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,.08), rgba(0,0,0,.22) 54%, #000 100%),
      url("./assets/vault-dark.png") center / cover no-repeat;
    animation: imageDrift 26s ease-in-out infinite alternate;
  }
  .glass {
    background: var(--panel);
    border: 1px solid var(--line);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.08), 0 18px 60px rgba(0,0,0,.22);
    backdrop-filter: blur(22px);
    -webkit-backdrop-filter: blur(22px);
  }
  .liquid-glass {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    border: none;
    box-shadow: inset 0 1px 1px rgba(255,255,255,0.1);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.45) 0%,
      rgba(255,255,255,0.15) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.15) 80%,
      rgba(255,255,255,0.45) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .liquid-glass-strong {
    background: rgba(255,255,255,0.01);
    background-blend-mode: luminosity;
    backdrop-filter: blur(50px);
    -webkit-backdrop-filter: blur(50px);
    border: none;
    box-shadow: 4px 4px 4px rgba(0,0,0,0.05), inset 0 1px 1px rgba(255,255,255,0.15);
    position: relative;
    overflow: hidden;
  }
  .liquid-glass-strong::before {
    content: "";
    position: absolute; inset: 0;
    border-radius: inherit;
    padding: 1.4px;
    background: linear-gradient(180deg,
      rgba(255,255,255,0.5) 0%,
      rgba(255,255,255,0.2) 20%,
      rgba(255,255,255,0) 40%,
      rgba(255,255,255,0) 60%,
      rgba(255,255,255,0.2) 80%,
      rgba(255,255,255,0.5) 100%);
    -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    pointer-events: none;
  }
  .glass-strong {
    background: var(--panel-2);
    border: 1px solid rgba(255,255,255,.14);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.09), 0 30px 90px rgba(0,0,0,.34);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
  }
  .white-card {
    background:
      linear-gradient(135deg, rgba(255,255,255,.13), rgba(191,227,255,.045)),
      radial-gradient(circle at 50% 0%, rgba(191,227,255,.16), transparent 30rem);
    color: #F4F8FF;
    border: 1px solid rgba(255,255,255,.16);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.10), 0 24px 80px rgba(21,94,239,.18);
    backdrop-filter: blur(28px);
    -webkit-backdrop-filter: blur(28px);
  }
  .btn {
    height: 48px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: .5rem;
    padding: 0 1.05rem;
    font-size: .9rem;
    font-weight: 700;
    transition: transform .2s ease, box-shadow .2s ease, background .2s ease, border-color .2s ease;
  }
  .btn:hover { transform: translateY(-2px); }
  .btn:active { transform: translateY(0); }
  .btn:focus-visible { outline: 2px solid #BFE3FF; outline-offset: 3px; }
  .btn-primary {
    color: white;
    background: linear-gradient(135deg, #155EEF, #2F80FF);
    box-shadow: 0 16px 40px rgba(47,128,255,.34);
  }
  .btn-secondary {
    color: white;
    background: rgba(255,255,255,.055);
    border: 1px solid rgba(255,255,255,.14);
  }
  .btn-success { color: #07111F; background: linear-gradient(135deg, #3DDC97, #9fffd5); }
  .btn-danger { color: #ffdbe3; background: rgba(255,92,122,.10); border: 1px solid rgba(255,92,122,.24); }
  .premium-frame {
    border-radius: 2rem;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,.12);
    background: rgba(255,255,255,.04);
    box-shadow: 0 30px 80px rgba(21,94,239,.28);
  }
  .premium-frame::before {
    content: "";
    position: absolute;
    inset: -24px;
    background: radial-gradient(circle at 55% 48%, rgba(47,128,255,.34), transparent 40%);
    z-index: -1;
    filter: blur(24px);
  }
  .card-hover { transition: transform .25s ease, border-color .25s ease, box-shadow .25s ease, background .25s ease; }
  .card-hover:hover { transform: translateY(-5px); border-color: rgba(191,227,255,.28); box-shadow: 0 24px 80px rgba(47,128,255,.16); }
  .logo-shell {
    background: rgba(244,248,255,.90);
    border-color: rgba(255,255,255,.62);
    box-shadow: inset 0 1px 0 rgba(255,255,255,.72), 0 12px 36px rgba(255,255,255,.10);
  }
  .logo-img { object-fit: contain; filter: drop-shadow(0 12px 24px rgba(0,0,0,.28)); }
  .mono-pill { font-family: Barlow, sans-serif; }
  .pulse-once { animation: pulseOnce 2.8s ease-in-out infinite; }
  .scan {
    position: relative;
    overflow: hidden;
  }
  .scan::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    top: -30%;
    height: 28%;
    background: linear-gradient(to bottom, transparent, rgba(191,227,255,.13), transparent);
    animation: scanDown 5.6s cubic-bezier(.2,.9,.25,1) infinite;
    pointer-events: none;
  }
  .toast {
    animation: toastIn .22s ease both;
  }
  .no-scrollbar::-webkit-scrollbar { display: none; }
  .no-scrollbar { scrollbar-width: none; }
  @keyframes imageDrift {
    from { transform: scale(1.02) translate3d(0,0,0); filter: saturate(1.02); }
    to { transform: scale(1.075) translate3d(-2.2%, -1.2%, 0); filter: saturate(1.14); }
  }
  @keyframes pulseOnce {
    0%, 100% { box-shadow: 0 0 0 0 rgba(47,128,255,0); }
    50% { box-shadow: 0 0 0 5px rgba(47,128,255,.13); }
  }
  @keyframes scanDown {
    0%, 45% { transform: translateY(0); opacity: 0; }
    52% { opacity: 1; }
    100% { transform: translateY(560%); opacity: 0; }
  }
  @keyframes toastIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @media (max-width: 640px) {
    .btn { width: 100%; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/framer-motion@10.18.0/dist/framer-motion.js"></script>
<script type="text/babel">
const { useEffect, useMemo, useState } = React;
const motion = window.Motion?.motion || {};
const MDiv = motion.div || "div";
const MSection = motion.section || "section";
const A = (file) => `./assets/${file}`;

const routes = [
  ["/", "Product"],
  ["/dashboard", "Dashboard"],
  ["/grants/new", "Create"],
  ["/grants/demo", "Grant"],
  ["/grants/demo/milestones/2/submit", "Submit"],
  ["/review", "Review"],
  ["/proof/demo-proof", "Proof"],
  ["/status", "Status"],
];

const demo = {
  grant: "Walrus Evidence SDK Grant",
  milestone: "Walrus Storage Integration",
  sponsor: "Tatum x Walrus Ecosystem",
  builder: "Northstar Labs",
  funding: "$2,000",
  milestoneFunding: "$700",
  wallet: "0x4ac9...91ef",
  tx: "0x82f4...aa19",
  object: "0x7b12...e4d0",
  package: "0x9f31...c0a7",
  packet: "walrus_blob_9Bs1...M03",
  hash: "sha256:8f31c0...92ab",
  progress: 67,
};

const grants = [
  ["Walrus Evidence SDK Grant", "Tatum x Walrus Ecosystem", "Northstar Labs", "$2,000", "Under Review", 67, 12],
  ["Sui GrantOps Registry", "Sui Builder House", "Index Harbor", "$6,500", "Approved", 82, 31],
  ["DAO Proof Portal", "Move Commons", "Civic Graph", "$4,200", "Active", 43, 18],
];

const exhibits = [
  ["A", "Walrus Upload Demo", "Video", "84.2 MB", "walrus_blob_8xA4...91F", "Stored on Walrus"],
  ["B", "Architecture Diagram", "Image", "2.1 MB", "walrus_blob_7Qp2...L18", "Stored on Walrus"],
  ["C", "Sui Transaction Screenshot", "Image", "1.6 MB", "walrus_blob_2Df9...K44", "Stored on Walrus"],
  ["D", "README Proof Packet", "JSON", "18 KB", "walrus_blob_9Bs1...M03", "Verified"],
];

const milestones = [
  ["MVP Prototype", "$500", "Approved", 100],
  ["Walrus Storage Integration", "$700", "Under Review", 67],
  ["Public Demo + Docs", "$800", "In Progress", 34],
];

const timeline = [
  "Grant room created",
  "Milestone submitted",
  "Evidence uploaded to Walrus",
  "Proof packet stored",
  "Sui record registered",
  "Sponsor reviewed",
  "Verdict pending",
];

function Icon({ name, className = "" }) {
  const props = { width: 18, height: 18, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.9, strokeLinecap: "round", strokeLinejoin: "round", className };
  const p = {
    copy: [<rect x="9" y="9" width="13" height="13" rx="2"/>, <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>],
    external: [<path d="M15 3h6v6"/>, <path d="M10 14 21 3"/>, <path d="M21 14v5a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5"/>],
    upload: [<path d="M12 16V4"/>, <path d="m7 9 5-5 5 5"/>, <path d="M20 16.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.5"/>],
    check: [<path d="m20 6-11 11-5-5"/>],
    warn: [<path d="m21.7 18-8-14a2 2 0 0 0-3.4 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.7-3Z"/>, <path d="M12 9v4"/>, <path d="M12 17h.01"/>],
    clock: [<circle cx="12" cy="12" r="9"/>, <path d="M12 7v5l3 2"/>],
    eye: [<path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Z"/>, <circle cx="12" cy="12" r="3"/>],
    file: [<path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/>, <path d="M14 2v6h6"/>, <path d="M8 13h8M8 17h5"/>],
    arrow: [<path d="M7 17 17 7"/>, <path d="M7 7h10v10"/>],
  };
  return <svg {...props}>{p[name] || p.check}</svg>;
}

function useRoute() {
  const read = () => (location.hash.replace(/^#/, "") || "/");
  const [route, setRoute] = useState(read());
  useEffect(() => {
    const onHash = () => setRoute(read());
    window.addEventListener("hashchange", onHash);
    return () => window.removeEventListener("hashchange", onHash);
  }, []);
  return [route, (to) => {
    const appRoutes = new Set(["/dashboard", "/grants/new", "/review", "/status"]);
    const appRoute = appRoutes.has(to) || to.startsWith("/grants/") || to.startsWith("/proof/");
    if (appRoute && window.parent && window.parent !== window) {
      window.parent.location.href = to;
      return;
    }
    location.hash = to;
    window.scrollTo({ top: 0, behavior: "smooth" });
  }];
}

function App() {
  const [route, go] = useRoute();
  const [toast, setToast] = useState("");
  useEffect(() => {
    const onToast = (event) => {
      setToast(event.detail || "Action complete");
      clearTimeout(window.__walproofToast);
      window.__walproofToast = setTimeout(() => setToast(""), 1800);
    };
    window.addEventListener("walproof:toast", onToast);
    return () => window.removeEventListener("walproof:toast", onToast);
  }, []);
  const page = {
    "/": <Landing go={go} />,
    "/dashboard": <Dashboard go={go} />,
    "/grants/new": <CreateGrant />,
    "/grants/demo": <GrantDetail go={go} />,
    "/grants/demo/milestones/2/submit": <SubmitProof go={go} />,
    "/review": <Review />,
    "/proof/demo-proof": <PublicProof />,
    "/status": <Status />,
  }[route] || <Landing go={go} />;
  const publicRoute = route === "/" || route === "/proof/demo-proof";
  return <>
    <div className="bg-walrus" />
    {publicRoute ? <TopNav go={go} route={route} /> : <AppShell go={go} route={route}>{page}</AppShell>}
    {publicRoute && page}
    {toast && <div className="toast fixed bottom-5 left-1/2 z-[80] -translate-x-1/2 rounded-2xl border border-ice/20 bg-navy/90 px-4 py-3 text-sm font-semibold text-white shadow-glow backdrop-blur-xl">{toast}</div>}
  </>;
}

function Button({ children, onClick, variant = "primary", disabled = false, title }) {
  const cls = variant === "primary" ? "btn btn-primary" : variant === "danger" ? "btn btn-danger" : variant === "success" ? "btn btn-success" : "btn btn-secondary";
  const handleClick = onClick || (() => window.dispatchEvent(new CustomEvent("walproof:toast", { detail: "Connect wallet and configure mainnet env to run this action" })));
  return <button title={title} disabled={disabled} onClick={handleClick} className={`${cls} ${disabled ? "cursor-not-allowed opacity-55 hover:translate-y-0" : ""}`}>{children}</button>;
}

function TopNav({ go, route }) {
  const [activeNav, setActiveNav] = useState(route === "/status" ? "Status" : "Product");
  useEffect(() => {
    if (route === "/status") setActiveNav("Status");
    if (route === "/proof/demo-proof") setActiveNav("View Proof");
    if (route === "/") setActiveNav("Product");
  }, [route]);
  const navItems = ["Product", "Proof Flow", "Integrations", "Status", "View Proof"];
  const jump = (id) => {
    const label = id === "product" ? "Product" : id === "proof-flow" ? "Proof Flow" : "Integrations";
    setActiveNav(label);
    if (route !== "/") {
      go("/");
      setTimeout(() => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" }), 80);
    } else {
      document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
    }
  };
  return <header className="fixed left-0 right-0 top-4 z-50 px-5 lg:px-16">
    <div className="mx-auto flex max-w-[1240px] items-center justify-between gap-4">
      <button onClick={() => go("/")} className="logo-shell flex h-12 w-[145px] items-center justify-center rounded-full border px-4 backdrop-blur-xl focus-visible:outline focus-visible:outline-2 focus-visible:outline-white sm:w-[180px]">
        <img src={A("walproof-logo-cropped.png")} alt="WalProof" className="logo-img h-8 w-full object-contain" />
      </button>
      <nav className="liquid-glass hidden items-center rounded-full px-1.5 py-1.5 md:flex">
        {navItems.map((item) => (
          <button
            key={item}
            onClick={() => item === "Status" ? (setActiveNav("Status"), go("/status")) : item === "View Proof" ? (setActiveNav("View Proof"), go("/proof/demo-proof")) : jump(item === "Product" ? "product" : item === "Proof Flow" ? "proof-flow" : "integrations")}
            className={`relative rounded-full px-3.5 py-2 text-sm font-semibold transition ${activeNav === item ? "bg-white text-black shadow-[0_6px_22px_rgba(255,255,255,.18)]" : "text-white/88 hover:text-white"}`}
          >
            {item}
          </button>
        ))}
      </nav>
      <div className="hidden sm:block">
        <button onClick={() => go("/dashboard")} className="liquid-glass-strong h-12 rounded-full px-5 text-sm font-semibold text-white">Open App</button>
      </div>
    </div>
  </header>;
}

function AppShell({ go, route, children }) {
  return <div className="min-h-screen lg:grid lg:grid-cols-[280px_1fr]">
    <aside className="hidden border-r border-white/10 bg-navy/78 p-5 backdrop-blur-2xl lg:block">
      <button onClick={() => go("/")} className="mb-8"><img src={A("walproof-logo-cropped.png")} alt="WalProof" className="logo-img w-[210px]" /></button>
      <nav className="space-y-1">
        {routes.slice(1).map(([to, label]) => <button key={to} onClick={() => go(to)} className={`flex h-11 w-full items-center justify-between rounded-xl px-3 text-left text-sm font-semibold transition ${route === to ? "bg-white text-navy" : "text-slateText hover:bg-white/[.06] hover:text-white"}`}>{label}<span className={`h-1.5 w-1.5 rounded-full ${route === to ? "bg-navy" : "bg-white/25"}`} /></button>)}
      </nav>
      <div className="glass mt-8 rounded-3xl p-4">
        <StatusBadge text="Setup warning" tone="warning" />
        <p className="mt-3 text-sm font-bold">Integration checks unavailable</p>
        <p className="mt-1 text-xs leading-5 text-slateText">Static demo has no server env. Status page shows setup requirements.</p>
      </div>
    </aside>
    <main className="min-w-0 px-4 py-5 sm:px-6">
      <div className="mb-6 flex flex-wrap items-center justify-between gap-3 rounded-2xl border border-white/10 bg-white/[.035] p-3 backdrop-blur-xl">
        <div className="flex flex-wrap gap-2"><WalletPill /><StatusBadge text="Walrus Ready" tone="walrus" /><StatusBadge text="Sui Mainnet" tone="mainnet" /></div>
        <Button variant="secondary" onClick={() => go("/proof/demo-proof")}>Public Proof</Button>
      </div>
      {children}
    </main>
  </div>;
}

function StatusBadge({ text, tone = "neutral" }) {
  const c = {
    success: "border-success/25 bg-success/10 text-success",
    warning: "border-amber/30 bg-amber/10 text-amber",
    danger: "border-danger/30 bg-danger/10 text-danger",
    walrus: "border-ice/30 bg-ice/10 text-ice",
    tatum: "border-royal/35 bg-royal/15 text-[#9cc5ff]",
    mainnet: "border-white/25 bg-white/10 text-white",
    neutral: "border-white/12 bg-white/[.055] text-mist"
  }[tone];
  return <span className={`inline-flex items-center gap-1.5 rounded-full border px-2.5 py-1 text-[11px] font-bold ${c}`}><span className="h-1.5 w-1.5 rounded-full bg-current" />{text}</span>;
}

function tone(status) {
  if (["Approved", "Verified", "Stored on Walrus"].includes(status)) return "success";
  if (["Under Review", "In Progress"].includes(status)) return "warning";
  if (status.includes("Revision") || status === "Rejected") return "danger";
  return "neutral";
}

function WalletPill() {
  return <span className="mono-pill inline-flex h-9 items-center rounded-xl border border-white/10 bg-white/[.055] px-3 text-xs text-mist">{demo.wallet}</span>;
}

function BlobPill({ id }) {
  const [copied, setCopied] = useState(false);
  return <button onClick={() => copy(id, setCopied)} className="mono-pill inline-flex max-w-full items-center gap-1.5 rounded-lg border border-ice/22 bg-ice/10 px-2 py-1 text-[11px] text-ice"><span className="truncate">{id}</span><Icon name={copied ? "check" : "copy"} className="h-3.5 w-3.5 shrink-0" /></button>;
}

function TxPill({ id }) {
  return <span className="mono-pill inline-flex rounded-lg border border-electric/25 bg-electric/10 px-2 py-1 text-[11px] text-ice">{id}</span>;
}

function copy(text, setCopied) {
  navigator.clipboard?.writeText(text);
  setCopied(true);
  setTimeout(() => setCopied(false), 1200);
}

function Landing({ go }) {
  return <MSection initial={{ opacity: 0 }} animate={{ opacity: 1 }}>
    <section className="relative overflow-hidden">
      <div className="hero-bg" />
      <div className="relative mx-auto grid min-h-screen max-w-[1240px] items-center gap-12 px-4 pt-28 pb-14 sm:px-6 lg:grid-cols-[.82fr_1.18fr]">

}

function DecisionPanel() {
  return <aside className="glass-strong rounded-3xl p-6 xl:sticky xl:top-5"><h2 className="font-heading text-2xl font-bold tracking-[-.04em]">Sponsor Verdict</h2><textarea rows="5" placeholder="Add sponsor review notes." className="mt-5 w-full rounded-2xl border border-white/10 bg-navy/70 px-3 py-3 text-sm text-white focus:border-ice focus:outline-none" /><div className="mt-4 grid gap-3"><Button variant="success">Approve Milestone</Button><Button variant="secondary">Request Revision</Button><Button variant="danger">Reject Milestone</Button></div><div className="mt-5 rounded-2xl border border-ice/20 bg-ice/10 p-4"><p className="font-bold">Decision confirmation</p><p className="mt-1 text-sm text-slateText">Records a review on Sui through Tatum RPC when connected.</p></div></aside>;
}

function Checklist() {
  return <div className="mt-5 grid gap-2">{["Evidence complete", "Demo works", "Blob IDs accessible", "Sui record present", "Scope matches milestone"].map((x, i) => <label key={x} className="flex items-center gap-3 rounded-2xl border border-white/10 bg-white/[.04] p-3 text-sm text-mist"><input type="checkbox" defaultChecked={i < 3} className="accent-[#2F80FF]" />{x}</label>)}</div>;
}

function ReviewQueue() {
  return <Panel title="Review Queue">{grants.map((g, i) => <div key={g[0]} className={`mb-3 rounded-2xl border p-4 last:mb-0 ${i === 0 ? "border-ice/25 bg-ice/10" : "border-white/10 bg-white/[.04]"}`}><p className="font-bold">{g[0]}</p><p className="mt-1 text-xs text-slateText">{demo.milestone} · {g[2]}</p><div className="mt-3 flex flex-wrap gap-2"><StatusBadge text={g[4]} tone={tone(g[4])} /><StatusBadge text={`${g[6]} files`} /></div></div>)}</Panel>;
}

function TimelineCard() {
  return <Panel title="Proof Timeline"><div className="grid gap-4">{timeline.map((x, i) => <MDiv key={x} initial={{ opacity: 0, x: -10 }} whileInView={{ opacity: 1, x: 0 }} viewport={{ once: true }} transition={{ delay: i * .04 }} className="flex gap-3"><span className={`mt-1.5 h-2.5 w-2.5 shrink-0 rounded-full ${i < 4 ? "bg-ice" : i < 6 ? "bg-electric" : "bg-amber"}`} /><div><p className="text-sm font-bold">{x}</p><p className="mono-pill text-[11px] text-slateText">2026-05-{String(22+i).padStart(2,"0")}</p></div></MDiv>)}</div></Panel>;
}

function RegisterCard() {
  return <Panel title="Register Proof Record"><div className="grid gap-3 sm:grid-cols-2"><Mini label="Wallet" value={demo.wallet} /><Mini label="Network" value="Mainnet" /><Mini label="Packet" value="Ready" /><Mini label="Gas" value="0.004 SUI" /></div><div className="mt-5"><Button disabled title="Connect backend and wallet to register">Submit to Sui</Button></div></Panel>;
}

function StatusSetup() {
  return <Panel title="Setup Status"><div className="grid gap-3"><StatusRow label="Tatum RPC" value="API key missing" warn /><StatusRow label="Walrus Storage" value="Backend check required" warn /><StatusRow label="Sui Network" value="Mainnet target" /><StatusRow label="Wallet" value={demo.wallet} /></div></Panel>;
}

function StatusRow({ label, value, warn }) {
  return <div className="flex items-center justify-between rounded-2xl border border-white/10 bg-white/[.04] p-3"><span className="text-sm text-slateText">{label}</span><span className={`mono-pill text-right text-xs ${warn ? "text-amber" : "text-mist"}`}>{value}</span></div>;
}

function PublicProofMini() {
  return <div className="premium-frame relative p-3">
    <img src={A("hero-walrus-blue.png")} alt="Public proof page preview" className="h-[360px] w-full rounded-[1.55rem] object-cover object-center" />
    <div className="absolute inset-3 rounded-[1.55rem] bg-gradient-to-br from-navy/20 via-navy/5 to-royal/22" />
    <div className="absolute bottom-6 left-6 right-6 rounded-3xl border border-ice/18 bg-[#07111F]/82 p-4 shadow-card backdrop-blur-2xl">
      <h3 className="font-heading text-2xl font-bold tracking-[-.04em]">Public Proof Page</h3>
      <div className="mt-3 flex flex-wrap gap-2"><StatusBadge text="Stored on Walrus" tone="walrus" /><StatusBadge text="Registered on Sui" tone="mainnet" /><StatusBadge text="Verified through Tatum" tone="tatum" /></div>
    </div>
  </div>;
}

function SponsorVerdict() {
  return <Panel title="Sponsor Verdict"><StatusBadge text="Under Review" tone="warning" /><div className="mt-5 grid gap-3"><Mini label="Reviewer" value="0x4ac9" /><Mini label="Verdict" value="Pending" /><Mini label="Review packet" value="Queued" /></div></Panel>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
